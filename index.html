<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Zaira 🌌</title>
    <style>
        /* Nueva tipografía Lora (Elegante, moderna y con curvas más suaves) */
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap');

        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: #010103;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff; display: flex; justify-content: center; align-items: center;
            transition: opacity 3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        #space-background {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }

        .aurora {
            position: absolute; border-radius: 50%;
            filter: blur(100px); mix-blend-mode: screen;
            animation: floatAurora 25s infinite alternate ease-in-out;
        }
        .aurora-1 { width: 70vw; height: 70vh; background: rgba(20, 50, 140, 0.25); top: -20%; left: -10%; }
        .aurora-2 { width: 60vw; height: 60vh; background: rgba(40, 100, 180, 0.2); bottom: -10%; right: -20%; animation-duration: 30s; animation-direction: alternate-reverse; }
        .aurora-3 { width: 55vw; height: 55vh; background: rgba(70, 20, 110, 0.2); top: 30%; left: 20%; animation-duration: 35s; }

        @keyframes floatAurora {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(5vw, 10vh) scale(1.1) rotate(5deg); }
            100% { transform: translate(-5vw, 5vh) scale(1.2) rotate(-5deg); }
        }

        .mini-star {
            position: absolute; background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 8px 1px rgba(150, 200, 255, 0.9);
            opacity: 0; animation: twinkle linear infinite;
        }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.8; transform: scale(1.3); }
            100% { opacity: 0; transform: scale(0.5); }
        }
        
        .intro-container {
            text-align: center; padding: 30px; max-width: 450px; width: 90%;
            animation: menuFadeIn 2.5s ease-in-out;
            transition: opacity 1.5s ease, transform 1.5s ease;
            z-index: 10; position: relative;
        }
        
        @keyframes menuFadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        h1 { 
            font-family: 'Lora', serif; font-weight: 500; font-size: 2.2rem; 
            letter-spacing: 2px; margin-bottom: 20px; color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        p { font-size: 1rem; line-height: 1.7; color: #b0b0c5; margin-bottom: 45px; font-weight: 300; letter-spacing: 0.5px; }
        
        .btn-entrar {
            background: rgba(255, 255, 255, 0.05); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.35);
            padding: 14px 35px; border-radius: 25px; font-size: 0.95rem; letter-spacing: 2px;
            cursor: pointer; text-decoration: none; transition: all 0.4s ease; display: inline-block;
            backdrop-filter: blur(5px);
        }
        .btn-entrar:hover { background: #ffffff; color: #020206; box-shadow: 0 0 25px rgba(255,255,255,0.4); border-color: #ffffff; }
        
        #pantalla-cinematica {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent; z-index: 20;
            display: flex; justify-content: center; align-items: center;
            padding: 40px; pointer-events: none;
        }

        #textos-narracion {
            max-width: 800px; text-align: center; min-height: 200px;
            display: flex; align-items: center; justify-content: center;
        }

        .texto-cine {
            font-family: 'Lora', serif;
            font-size: 2.2rem; line-height: 1.7; font-weight: 400; 
            color: #f1f5f9; margin: 0; letter-spacing: 1px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            opacity: 0; filter: blur(12px); transform: scale(0.95) translateY(10px);
        }

        .texto-cine.fade-in { 
            animation: cinematicEntry var(--duration) ease-out forwards;
        }
        
        .texto-cine.fade-out { 
            animation: cinematicExit 2s ease-in forwards;
        }

        @keyframes cinematicEntry {
            0% { opacity: 0; filter: blur(15px); transform: scale(0.95) translateY(15px); }
            15% { opacity: 1; filter: blur(0); transform: scale(1) translateY(0); }
            100% { opacity: 1; filter: blur(0); transform: scale(1.05) translateY(-15px); }
        }

        @keyframes cinematicExit {
            0% { opacity: 1; filter: blur(0); transform: scale(1.05) translateY(-15px); }
            100% { opacity: 0; filter: blur(10px); transform: scale(1.08) translateY(-25px); }
        }

        .btn-skip {
            position: absolute; bottom: 40px; right: 40px;
            background: none; border: none; color: rgba(255,255,255,0.2);
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem; cursor: pointer;
            transition: color 0.3s, opacity 0.5s; padding: 10px; z-index: 25;
            opacity: 0; pointer-events: none; letter-spacing: 1px;
        }
        .btn-skip.visible { opacity: 1; pointer-events: auto; }
        .btn-skip:hover { color: rgba(255,255,255,0.6); }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            h1 { font-size: 1.9rem; }
            .texto-cine { font-size: 1.45rem; line-height: 1.6; }
            .btn-skip { bottom: 25px; right: 25px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div id="space-background">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
        <div id="stars-container"></div>
    </div>

    <audio id="bg-music" src="audios/ambiente.mp3" loop></audio>

    <div class="intro-container" id="menu-inicial">
        <h1>Capitulo 1: La Creación</h1>
        <p>
            En algún lugar del espacio y del tiempo, una anomalía que desafió la credibilidad de las mismas, desató un sinfin de vida que atenta con permanecer toda la eternidad.
        </p>
        <a href="Pages/cielo.html" class="btn-entrar" id="btn-iniciar-experiencia">Ver</a>
    </div>

    <div id="pantalla-cinematica" class="hidden">
        <div id="textos-narracion"></div>
        <button class="btn-skip" id="btn-skip-intro">Saltar intro ➔</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const starsContainer = document.getElementById('stars-container');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'mini-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                const size = Math.random() * 2.5 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = (Math.random() * 5 + 3) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                starsContainer.appendChild(star);
            }

            const btnIniciar = document.getElementById("btn-iniciar-experiencia");
            const menuInicial = document.getElementById("menu-inicial");
            const pantallaCinematica = document.getElementById("pantalla-cinematica");
            const textosNarracion = document.getElementById("textos-narracion");
            const btnSkipIntro = document.getElementById("btn-skip-intro");
            const bgMusic = document.getElementById("bg-music");

            const cinematicaTextos = [
                { texto: "Hay una creencia que dice que las personas no se encuentran por accidente, sino que ya estaban escritas en algún lugar... también conocido como lo que nosotros llamamos destino.", tiempo: 10500 },
                { texto: "Dicen que el universo, en su inmensidad, se toma el tiempo de mover cada estrella, cada átomo, cada partícula, cada minúsculo pedazo de materia, hasta que el momento sea el perfecto.", tiempo: 11500 },
                { texto: "Porque entre millones de galaxias, años luz de distancia y un infinito de posibilidades, coincidir en este tiempo y en este espacio es el milagro más lindo de todos.", tiempo: 11000 },
                { texto: "Yo creo que no es tan así.", tiempo: 6000 },
                { texto: "Creo que coincidir es un milagro, pero el más lindo de todos es que las estrellas te crearon... y te pusieron en mi camino.", tiempo: 10000 },
                { texto: "Hay rincones del universo que guardan historias para siempre, y momentos tan mágicos que hacen que el tiempo se pare.", tiempo: 10000 },
                { texto: "El cielo es el pasado, es la luz que las estrellas dejaron hace tiempo. Un día iremos hacia allá, pero mientras tanto...", tiempo: 10500 },
                { texto: "...decidí que podía empezar a predicar tu nombre sobre las estrellas.", tiempo: 9000 },
                { texto: "Si el 5 de mayo del año 2025, parada sobre Barranqueras a las 04:00 AM, hubieses levantado la mirada hacia el cielo infinito, esta hubiese sido, exactamente, la posición de las estrellas.", tiempo: 13000 }
            ];

            let indexActual = 0;
            let temporizadores = [];

            btnIniciar.addEventListener("click", (e) => {
                e.preventDefault();
                bgMusic.volume = 0.5;
                bgMusic.play().catch(() => console.log("Audio play bloqueado"));

                menuInicial.style.opacity = "0";
                menuInicial.style.transform = "translateY(-20px) scale(0.95)";
                menuInicial.style.filter = "blur(10px)";
                
                setTimeout(() => {
                    menuInicial.classList.add("hidden");
                    pantallaCinematica.classList.remove("hidden");
                    setTimeout(() => { if(btnSkipIntro) btnSkipIntro.classList.add("visible"); }, 5000);
                    reproducirSecuencia();
                }, 1500);
            });

            function reproducirSecuencia() {
                if (indexActual < cinematicaTextos.length) {
                    const datosPaso = cinematicaTextos[indexActual];
                    textosNarracion.innerHTML = `<p class="texto-cine">${datosPaso.texto}</p>`;
                    const parrafo = textosNarracion.querySelector("p");
                    parrafo.style.setProperty('--duration', datosPaso.tiempo + 'ms');

                    setTimeout(() => { if(parrafo) parrafo.classList.add("fade-in"); }, 100);
                    
                    const tSalida = setTimeout(() => {
                        if (parrafo) { parrafo.classList.remove("fade-in"); parrafo.classList.add("fade-out"); }
                    }, datosPaso.tiempo - 2000);

                    const tSiguiente = setTimeout(() => {
                        indexActual++; reproducirSecuencia();
                    }, datosPaso.tiempo);

                    temporizadores.push(tSalida, tSiguiente);
                } else {
                    finalizarEfectoCinematico();
                }
            }

            function finalizarEfectoCinematico() {
                temporizadores.forEach(t => clearTimeout(t));
                sessionStorage.setItem('universo_audio_time', bgMusic.currentTime);
                document.body.style.opacity = "0";
                setTimeout(() => { window.location.href = "Pages/cielo.html"; }, 3000);
            }

            if(btnSkipIntro) btnSkipIntro.addEventListener("click", finalizarEfectoCinematico);
            
            // Forzar disparo de evento resize automático para corregir renders iniciales truncados del inspector
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
        });
    </script>
</body>
</html>
